name: bt_mobile
description: Browntape native mobile application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  http: ^1.2.2
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  mobile_scanner: ^7.2.0
  image_picker: ^1.2.2
  permission_handler: ^12.0.3
  camera: ^0.12.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/browntape_logo.png
    - assets/images/app_icon.png
    - lib/core/network/fixtures/mock/
